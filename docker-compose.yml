services:
  palm-reading-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: palm-reading-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PALM_DATA_DIR: /app/data
      PALM_CORS_ORIGINS: '["https://www.zmintz.com","https://zmintz.com"]'
    ports:
      - "8000:8000"
    volumes:
      - palm-reading-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  palm-reading-data:
